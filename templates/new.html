{% extends "layout.html" %}

{% block title %}Add Competence{% endblock %}

{% block main %}
<div class="card card-form shadow-sm">
    <div class="card-body p-4">
        <h5 class="card-title text-center mb-4">Submit New Competence</h5>
        <form action="/new" method="post">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="competence" name="competence" placeholder="Competence name" autocomplete="off" autofocus>
                <label for="competence">Competence name</label>
            </div>
            <div class="mb-3">
                <label for="competence_type" class="form-label">Competence type</label>
                <select class="form-select" id="competence_type" name="competence_type" required>
                    <option value="" disabled selected>Select type</option>
                    <option>Initial</option>
                    <option>6 month</option>
                    <option>Annual</option>
                </select>
            </div>
            <div class="form-floating mb-4">
                <input type="date" class="form-control" id="done_date" name="done_date" placeholder="Assessment date" required>
                <label for="done_date">Assessment date</label>
            </div>
            <button type="submit" class="btn btn-primary w-100">Submit</button>
        </form>
    </div>
</div>
{% endblock %}
