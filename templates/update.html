{% extends "layout.html" %}

{% block title %}
    Update
{% endblock %}

{% block main %}
    <h2 class="competence-list-heading">UPDATE EXISTING COMPETENCE</h2>
    <p></p>
    <form action="/update" method="post">
        <div class="mb-3">
           <select name = "competence" class="form-control mx-auto w-auto">
                <option disabled selected>Select competence to update</option>
                {% for competence in competences %}
                    {% if competence["status"] == "ALMOST DUE" or competence["status"] == "OVERDUE" or competence["status"] == "Returned for amendment" %}
                        <option>{{ competence["competence"] }}</option>
                    {% endif %}
                {% endfor %}
           </select>
        </div>
        <div>
            <select name = "competence_type" class="form-control mx-auto w-auto">
                <option disabled selected>Select competence type</option>
                <option>Initial</option>
                <option>6 month</option>
                <option>Annual</option>
           </select>
        </div>
        <p></p>
        <div class="mb-3">
            <label for="done_date" class="form-label">Assessment Date</label>
            <input id="done_date" class="form-control mx-auto w-auto" name="done_date" type="date">
        </div>
        <button class="btn btn-primary" type="submit">Update</button>
    </form>
    <style>
        .competence-list-heading {
            color: black; /* Text color */
            font-weight: bold; /* Bold text */
            background-color: lightgray; /* Light gray background */
            padding: 10px; /* Add padding for better spacing */
            border-radius: 5px; /* Optional: rounded corners */
            text-align: center; /* Optional: center the text */
        }
    </style>
    
{% endblock %}
